        )}
      </div>

      {/* Comparativo + maior categoria */}
      {(()=>{
        const prevDate=new Date(parseInt(selM.split('-')[0]),parseInt(selM.split('-')[1])-2,1);
        const prevKey=`${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,'0')}`;
        const prevRows=data.filter(r=>toMk(r.date)===prevKey);
        const prevGasto=totalPessoa(prevRows,pessoa);
        const diff=gasto-prevGasto;
        const pct=prevGasto>0?Math.round(diff/prevGasto*100):0;
        const topCat=cats[0];
        return(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
            <div className="card" style={{padding:'14px'}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:5}}>vs {mlabel(prevKey)}</div>
              {prevGasto>0?(
                <>
                  <div style={{fontSize:18,fontWeight:800,color:diff<=0?'var(--green)':'var(--red)'}}>
                    {diff>=0?'+':''}{fmtK(Math.abs(diff))}
                  </div>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{diff>=0?'↑':'↓'} {Math.abs(pct)}% {diff<=0?'a menos':'a mais'}</div>
                </>
              ):(
                <>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--text3)'}}>—</div>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>sem dado anterior</div>
                </>
              )}
            </div>
            <div className="card" style={{padding:'14px'}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:5}}>Top categoria</div>
              {topCat?(
                <>
                  <div style={{fontSize:18,fontWeight:800,color:CAT_COLOR[topCat[0]]||'var(--text)'}}>
                    {fmtK(topCat[1])}
                  </div>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{CAT_EMOJI[topCat[0]]||''} {topCat[0]}</div>
                </>
              ):(
                <>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--text3)'}}>—</div>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>sem gastos</div>
                </>
              )}
            </div>
          </div>
        );
      })()}

      {/* Pizza */}
      {cats.length>0&&(
        <div className="card" style={{marginBottom:12,padding:'16px 14px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em'}}>
              Categorias · {pessoa} {catFilter&&<span style={{color:getCatColor(catFilter),textTransform:'none',letterSpacing:0,marginLeft:6}}>· {getCatEmoji(catFilter)} {catFilter}</span>}
            </div>
            {catFilter&&(
              <button onClick={()=>setCatFilter(null)} style={{padding:'4px 10px',borderRadius:14,background:'var(--moz-bg)',border:'1px solid var(--moz-border)',color:'var(--moz)',fontSize:11,fontWeight:700}}>
                ✕ Limpar filtro
              </button>
            )}
          </div>
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <Donut
              segs={cats.slice(0,8).map(([l,v])=>({label:l,v,c:getCatColor(l)}))}
              size={130}
              centerLabel={catFilter?fmtK(catMap[catFilter]||0):fmtK(catTotal)}
              centerSub={catFilter?'filtrado':'total'}
              onSegmentClick={label=>setCatFilter(catFilter===label?null:label)}
              activeLabel={catFilter}
            />
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:7,minWidth:0}}>
              {cats.slice(0,6).map(([cat,val])=>(
                <button key={cat} onClick={()=>setCatFilter(catFilter===cat?null:cat)} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 6px',borderRadius:8,background:catFilter===cat?getCatColor(cat)+'22':'transparent',border:'none',cursor:'pointer',textAlign:'left'}}>
                  <div style={{width:10,height:10,borderRadius:3,background:getCatColor(cat),flexShrink:0,opacity:!catFilter||catFilter===cat?1:0.35}}></div>
                  <span style={{fontSize:11,color:catFilter===cat?getCatColor(cat):'var(--text2)',fontWeight:catFilter===cat?700:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat}</span>
                  <span style={{fontSize:11,fontWeight:700,color:catFilter===cat?getCatColor(cat):'var(--text)'}}>{fmtK(val)}</span>
                </button>
              ))}
            </div>
          </div>
          {/* Lista de gastos da categoria filtrada */}
          {catFilter&&(()=>{
            const catItems=catRows.filter(r=>r.categoria===catFilter).sort((a,b)=>b.date>a.date?1:-1);
            const catTot=catMap[catFilter]||0;
            return(
              <div style={{marginTop:14,paddingTop:14,borderTop:'1px dashed var(--border2)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--text2)'}}>{catItems.length} lançamento{catItems.length!==1?'s':''} em {getCatEmoji(catFilter)} {catFilter}</span>
                  <span style={{fontSize:14,fontWeight:800,color:getCatColor(catFilter)}}>{fmt(catTot)}</span>
                </div>
                {catItems.slice(0,15).map((r,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<Math.min(14,catItems.length-1)?'1px solid var(--border)':'none'}}>
                    <div style={{width:30,height:30,borderRadius:8,background:getCatColor(r.categoria)+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>
                      {getCatEmoji(r.categoria)}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.desc}</div>
                      <div style={{fontSize:10,color:'var(--text2)',marginTop:1}}>{fmtDate(r.date)} · <span style={{color:PERSON_COLOR[r.deQuem]||'var(--text2)',fontWeight:700}}>{r.deQuem}</span></div>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,flexShrink:0}}>{fmt(r.deQuem==='Conjunto'&&pessoa!=='Conjunto'?r.valor/2:r.valor)}</span>
                  </div>
                ))}
                {catItems.length>15&&<div style={{fontSize:11,color:'var(--text3)',textAlign:'center',padding:'6px 0'}}>+ {catItems.length-15} outros lançamentos</div>}
              </div>
            );
          })()}
        </div>
      )}

      {/* Dashboard de equilíbrio Lindito vs Mozicho (visível apenas em Conjunto ou sempre como info) */}
      {(()=>{
        const linTotal=totalPessoa(rows,'Lindito');
        const mozTotal=totalPessoa(rows,'Mozicho');
        const conjTotal=linTotal+mozTotal;
        if(conjTotal===0)return null;
        const linPct=linTotal/conjTotal*100;
        const mozPct=mozTotal/conjTotal*100;
        const diff=Math.abs(linPct-50);
        // Renda também
        const linRenda=totalReceita(rows,'Lindito');
        const mozRenda=totalReceita(rows,'Mozicho');
        return(
          <div className="card" style={{marginBottom:12,padding:'16px 14px'}}>
            <ST>⚖️ Equilíbrio do mês</ST>
            <div style={{display:'flex',height:32,borderRadius:10,overflow:'hidden',marginBottom:8,border:'1px solid var(--border)'}}>
              <div style={{width:`${linPct}%`,background:'var(--lin)',color:'#fff',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',transition:'width 0.4s'}}>
                {linPct>=15?`${Math.round(linPct)}%`:''}
              </div>
              <div style={{width:`${mozPct}%`,background:'var(--moz)',color:'#fff',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',transition:'width 0.4s'}}>
                {mozPct>=15?`${Math.round(mozPct)}%`:''}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div style={{padding:'10px 12px',background:'var(--lin-bg)',borderRadius:10,borderLeft:'3px solid var(--lin)'}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--lin)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Lindito</div>
                <div style={{fontSize:16,fontWeight:800,color:'var(--lin)',marginTop:2}}>{fmt(linTotal)}</div>
                {linRenda>0&&<div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>renda: {fmtK(linRenda)}</div>}
              </div>
              <div style={{padding:'10px 12px',background:'var(--moz-bg)',borderRadius:10,borderLeft:'3px solid var(--moz)'}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--moz)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Mozicho</div>
                <div style={{fontSize:16,fontWeight:800,color:'var(--moz)',marginTop:2}}>{fmt(mozTotal)}</div>
                {mozRenda>0&&<div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>renda: {fmtK(mozRenda)}</div>}
              </div>
            </div>
            <div style={{fontSize:12,color:'var(--text2)',padding:'8px 10px',background:diff<10?'var(--conj-bg)':diff<25?'#fff7ed':'var(--moz-bg)',borderRadius:8,textAlign:'center'}}>
              {diff<10?'🟢 Equilibrados — gastos proporcionais':
               diff<25?`🟡 Pequeno desequilíbrio — ${linTotal>mozTotal?'Lindito':'Mozicho'} gastou ${Math.round(diff*2)}% a mais`:
               `🔴 Desequilibrado — ${linTotal>mozTotal?'Lindito':'Mozicho'} gastou bem mais que ${linTotal>mozTotal?'Mozicho':'Lindito'}`}
            </div>
          </div>
        );
      })()}

      {/* Histórico por categoria — mini line chart com projeção */}
      {(()=>{
        const nowMk=currentMk();
        // Meses com dados reais (cronológico, do mais antigo ao mais recente), só até o mês atual
        const realMonths=allMs.filter(m=>m<=nowMk).slice().reverse();
        if(realMonths.length<2)return null;

        // Define janela conforme período escolhido
        const windowMonths=trendRange==='all'?realMonths:realMonths.slice(-trendRange);

        // Soma por mês conforme filtro de categoria e pessoa
        const sumForMonth=(m)=>{
          const r=data.filter(rr=>toMk(rr.date)===m&&!NON_GASTO.has(rr.categoria));
          const filt=trendCat==='all'?r:r.filter(rr=>rr.categoria===trendCat);
          let total=0;
          for(const rr of filt){
            if(pessoa==='Conjunto')total+=rr.valor;
            else if(rr.deQuem===pessoa)total+=rr.valor;
            else if(rr.deQuem==='Conjunto')total+=rr.valor/2;
          }
          return total;
        };

        const dataPts=windowMonths.map((m,i)=>({m,total:sumForMonth(m),idx:i,real:true}));

        // Regressão linear sobre os meses reais para projetar os próximos 2 meses
        const reg=linearRegression(dataPts.map(p=>({x:p.idx,y:p.total})));
        const projPts=[];
        if(showProjection&&dataPts.length>=3){
          const lastIdx=dataPts.length-1;
          for(let k=1;k<=2;k++){
            const idx=lastIdx+k;
            const projVal=Math.max(0,reg.predict(idx));
            projPts.push({m:addMonths(windowMonths[windowMonths.length-1],k),total:projVal,idx,real:false});
          }
        }

        const allPts=[...dataPts,...projPts];
        const max=Math.max(...allPts.map(p=>p.total),1);
        const w=320,h=130,padL=10,padR=10,padT=12,padB=26;
        const plotW=w-padL-padR,plotH=h-padT-padB;
        const linecol=trendCat==='all'?'var(--accent)':getCatColor(trendCat);
        const xFor=(idx)=>padL+(allPts.length===1?plotW/2:(idx/(allPts.length-1))*plotW);
        const yFor=(val)=>padT+plotH-(val/max)*plotH;

        const realScreenPts=dataPts.map(p=>({x:xFor(p.idx),y:yFor(p.total),p}));
        const projScreenPts=projPts.map(p=>({x:xFor(p.idx),y:yFor(p.total),p}));

        // Estatísticas
        const totalPeriodo=dataPts.reduce((s,p)=>s+p.total,0);
        const mediaMensal=totalPeriodo/dataPts.length;
        const ultimoMes=dataPts[dataPts.length-1].total;
        const penultimo=dataPts.length>=2?dataPts[dataPts.length-2].total:0;
        const variacaoMoM=penultimo>0?((ultimoMes-penultimo)/penultimo*100):0;
        const tendenciaTexto=reg.slope>mediaMensal*0.05?'📈 crescente':reg.slope<-mediaMensal*0.05?'📉 decrescente':'➡️ estável';
        const projProximoMes=projPts.length>0?projPts[0].total:null;

        return(
          <div className="card" style={{marginBottom:12,padding:'16px 14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em'}}>
                📈 Tendência {tendenciaTexto}
              </div>
              <div style={{position:'relative'}}>
                <select value={trendCat} onChange={e=>setTrendCat(e.target.value)} style={{
                  padding:'5px 26px 5px 10px',background:linecol+'18',
                  border:`1.5px solid ${linecol}`,
                  borderRadius:10,fontSize:11,fontWeight:700,color:linecol,outline:'none',appearance:'none',cursor:'pointer'
                }}>
                  <option value="all">📋 Todas categorias</option>
                  {getCats().slice().sort((a,b)=>a.localeCompare(b,'pt-BR')).map(c=>(
                    <option key={c} value={c}>{getCatEmoji(c)} {c}</option>
                  ))}
                </select>
                <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',fontSize:8,color:linecol}}>▼</span>
              </div>
            </div>

            {/* Seletor de período */}
            <div style={{display:'flex',gap:6,marginBottom:12}}>
              {[[6,'6 meses'],[12,'12 meses'],['all','Tudo']].map(([val,lbl])=>(
                <button key={val} onClick={()=>setTrendRange(val)} style={{
                  flex:1,padding:'6px 4px',borderRadius:8,fontSize:11,fontWeight:700,
                  background:trendRange===val?linecol:'var(--bg3)',
                  color:trendRange===val?'#fff':'var(--text2)',
                  border:`1px solid ${trendRange===val?linecol:'var(--border)'}`
                }}>{lbl}</button>
              ))}
              <button onClick={()=>setShowProjection(s=>!s)} style={{
                flex:1.2,padding:'6px 4px',borderRadius:8,fontSize:11,fontWeight:700,
                background:showProjection?'var(--accent-bg)':'var(--bg3)',
                color:showProjection?'var(--accent)':'var(--text3)',
                border:`1px solid ${showProjection?'var(--accent)':'var(--border)'}`
              }}>{showProjection?'🔮 Projeção ON':'🔮 Projeção OFF'}</button>
            </div>

            <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`}>
              {/* Linha de grade no zero */}
              <line x1={padL} y1={padT+plotH} x2={w-padR} y2={padT+plotH} stroke="var(--border)" strokeWidth="1"/>
              {/* Linha de média */}
              <line x1={padL} y1={yFor(mediaMensal)} x2={w-padR} y2={yFor(mediaMensal)} stroke="var(--text3)" strokeWidth="1" strokeDasharray="3 3" opacity="0.5"/>
              <text x={w-padR} y={yFor(mediaMensal)-3} textAnchor="end" fontSize="8" fill="var(--text3)" fontFamily="Plus Jakarta Sans">média {fmtK(mediaMensal)}</text>

              {/* Área dos dados reais */}
              {realScreenPts.length>1&&(
                <path d={`M${realScreenPts[0].x} ${padT+plotH}${realScreenPts.map(p=>` L${p.x} ${p.y}`).join('')}L${realScreenPts[realScreenPts.length-1].x} ${padT+plotH}Z`}
                  fill={linecol} opacity="0.12"/>
              )}
              {/* Linha dos dados reais */}
              {realScreenPts.length>1&&(
                <polyline points={realScreenPts.map(p=>`${p.x},${p.y}`).join(' ')}
                  fill="none" stroke={linecol} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
              )}
              {/* Linha de projeção (tracejada) — conecta último ponto real aos projetados */}
              {projScreenPts.length>0&&(
                <polyline points={[realScreenPts[realScreenPts.length-1],...projScreenPts].map(p=>`${p.x},${p.y}`).join(' ')}
                  fill="none" stroke={linecol} strokeWidth="2" strokeDasharray="5 4" strokeLinecap="round" opacity="0.7"/>
              )}
              {/* Pontos reais */}
              {realScreenPts.map((p,i)=>(
                <g key={`r${i}`}>
                  <circle cx={p.x} cy={p.y} r="3.5" fill={linecol}/>
                  <title>{mlabel(p.p.m)}: {fmt(p.p.total)}</title>
                </g>
              ))}
              {/* Pontos projetados (vazados) */}
              {projScreenPts.map((p,i)=>(
                <g key={`p${i}`}>
                  <circle cx={p.x} cy={p.y} r="3.5" fill="var(--bg2)" stroke={linecol} strokeWidth="2" strokeDasharray="2 1.5"/>
                  <title>Projeção {mlabel(p.p.m)}: {fmt(p.p.total)}</title>
                </g>
              ))}
              {/* Labels do eixo X */}
              {allPts.map((p,i)=>{
                const showLabel=allPts.length<=8||i%Math.ceil(allPts.length/8)===0||i===allPts.length-1;
                if(!showLabel)return null;
                const sp=xFor(p.idx);
                return(
                  <text key={`l${i}`} x={sp} y={h-8} textAnchor="middle" fontSize="9" fill={p.real?'var(--text2)':'var(--text3)'} fontFamily="Plus Jakarta Sans" fontStyle={p.real?'normal':'italic'}>
                    {mlabelShort(p.m)}
                  </text>
                );
              })}
            </svg>

            {/* Estatísticas resumidas */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:10}}>
              <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:8}}>
                <div style={{fontSize:10,color:'var(--text2)',fontWeight:600}}>Média mensal</div>
                <div style={{fontSize:14,fontWeight:800,color:linecol,marginTop:1}}>{fmt(mediaMensal)}</div>
              </div>
              <div style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:8}}>
                <div style={{fontSize:10,color:'var(--text2)',fontWeight:600}}>Variação último mês</div>
                <div style={{fontSize:14,fontWeight:800,color:variacaoMoM>0?'var(--red)':variacaoMoM<0?'var(--green)':'var(--text2)',marginTop:1}}>
                  {variacaoMoM>0?'↑':variacaoMoM<0?'↓':''} {Math.abs(variacaoMoM).toFixed(0)}%
                </div>
              </div>
            </div>
            {showProjection&&projProximoMes!=null&&(
              <div style={{marginTop:8,padding:'8px 10px',background:'var(--accent-bg)',borderRadius:8,fontSize:11,color:'var(--text2)',lineHeight:1.5}}>
                🔮 <strong style={{color:'var(--accent)'}}>Projeção {mlabel(projPts[0].m)}:</strong> mantendo o ritmo atual, a estimativa é de <strong style={{color:'var(--accent)'}}>{fmt(projProximoMes)}</strong>. Baseada em regressão linear sobre {dataPts.length} meses.
              </div>
            )}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
              <span style={{fontSize:11,color:'var(--text2)'}}>Total no período: <strong style={{color:linecol}}>{fmt(totalPeriodo)}</strong></span>
              <span style={{fontSize:11,color:'var(--text2)'}}>Máx: <strong style={{color:'var(--text)'}}>{fmtK(max)}</strong></span>
            </div>
          </div>
        );
      })()}

      {/* Recentes */}
      <div className="card" style={{padding:'16px 14px'}}>
        <ST>Recentes</ST>
        {(()=>{
          // Recentes considera TODOS os lançamentos da pessoa (não só do mês selecionado),
          // ordenados do mais novo para o mais antigo.
          const allPersonRows=pessoa==='Lindito'?data.filter(r=>r.deQuem==='Lindito'||r.deQuem==='Conjunto')
            :pessoa==='Mozicho'?data.filter(r=>r.deQuem==='Mozicho'||r.deQuem==='Conjunto')
            :data;
          const recentes=[...allPersonRows]
            .filter(r=>toMk(r.date))
            .sort((a,b)=>b.date>a.date?1:b.date<a.date?-1:0)
            .slice(0,30);
          if(recentes.length===0){
            return<div style={{textAlign:'center',color:'var(--text3)',padding:'16px 0',fontSize:13}}>Nenhum lançamento</div>;
          }
          return(
            <div style={{maxHeight:320,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
              {recentes.map((r,i,arr)=>(
                <div key={r._row||`${r.date}-${i}`} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<arr.length-1?'1px solid var(--border)':'none'}}>
                  <div style={{width:36,height:36,borderRadius:10,background:(CAT_COLOR[r.categoria]||'#555')+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0}}>
                    {CAT_EMOJI[r.categoria]||'📌'}
                  </div>
                  <div style={{flex:1,minWidth:0}}>

                  </div>
                  <span style={{fontSize:14,fontWeight:700,flexShrink:0}}>{fmt(r.deQuem==='Conjunto'&&pessoa!=='Conjunto'?r.valor/2:r.valor)}</span>

}

// ── Orçamento Modal ───────────────────────────────────────────────────────────
function OrcamentoModal({onClose,budgets,extras,onSave,monthKey,hasSheetsSync}){
  useBackButton(onClose,'orc');
  const [lb,setLb]=useState(String(budgets.Lindito||0));
  const [mb,setMb]=useState(String(budgets.Mozicho||0));
  const [exs,setExs]=useState(extras||[]);
  const [ed,setEd]=useState('');const [ev,setEv]=useState('');const [ep,setEp]=useState('Lindito');
  function addEx(){const v=parseFloat(ev.replace(',','.'));if(!v||!ed)return;setExs(e=>[...e,{desc:ed,valor:v,pessoa:ep,date:today()}]);setEd('');setEv('');}
  function save(){onSave({Lindito:parseFloat(lb)||0,Mozicho:parseFloat(mb)||0},exs);onClose();}
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <button className="modal-x" onClick={onClose} aria-label="Fechar">×</button>
        <div className="modal-handle"></div>
        <div className="modal-title">Orçamento · {mlabel(monthKey)}</div>
        <div className="field"><div className="fl">Renda Lindito</div><input className="fi" type="number" value={lb} onChange={e=>setLb(e.target.value)} placeholder="0,00"/></div>
        <div className="field"><div className="fl">Renda Mozicho</div><input className="fi" type="number" value={mb} onChange={e=>setMb(e.target.value)} placeholder="0,00"/></div>
        <div style={{padding:'0 20px 8px',borderTop:'1px solid var(--border)',paddingTop:16,marginTop:4}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:10}}>Entradas extras</div>
          {exs.map((ex,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{ex.desc}</div><div style={{fontSize:11,color:'var(--text2)'}}>{ex.pessoa} · {fmt(ex.valor)}</div></div>
              <button onClick={()=>setExs(e=>e.filter((_,j)=>j!==i))} style={{color:'var(--red)',fontSize:20,padding:4}}>×</button>
            </div>
          ))}
          <div style={{marginTop:10,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <input className="fi" type="text" placeholder="Descrição" value={ed} onChange={e=>setEd(e.target.value)} style={{gridColumn:'1/-1'}}/>
            <input className="fi" type="number" placeholder="Valor" value={ev} onChange={e=>setEv(e.target.value)}/>
            <select className="fi" value={ep} onChange={e=>setEp(e.target.value)}><option>Lindito</option><option>Mozicho</option><option>Conjunto</option></select>
          </div>
          <button onClick={addEx} disabled={!ed||!ev} style={{marginTop:8,width:'100%',padding:'10px',background:'var(--bg3)',border:'1.5px dashed var(--border2)',borderRadius:12,fontSize:13,fontWeight:600,color:'var(--accent)'}}>+ Entrada extra</button>
        </div>
        <button className="btn" onClick={save} style={{marginTop:16}}>Salvar orçamento 💾</button>
        {hasSheetsSync&&(
          <div style={{textAlign:'center',fontSize:11,color:'var(--green)',fontWeight:600,padding:'6px 20px 0'}}>
            ✓ Será salvo na planilha Google Sheets
          </div>
        )}
        {!hasSheetsSync&&(
          <div style={{textAlign:'center',fontSize:11,color:'var(--amber)',fontWeight:600,padding:'6px 20px 0'}}>
            ⚠️ Faça login novamente para salvar na planilha
          </div>
        )}
      </div>
    </div>
  );
}

// ── Saldos Screen ─────────────────────────────────────────────────────────────
function Saldos({data,onQuit,onRefresh,syncStatus}){
  const [selM,setSelM]=useState('all');
  const allMs=[...new Set(data.map(r=>toMk(r.date)))].filter(m=>m&&/^\d{4}-\d{2}$/.test(m)&&m>='2025-01').sort();
  const filteredRows=selM==='all'?data:data.filter(r=>toMk(r.date)===selM);
  const debt=calcDebt(filteredRows);
  const quites=Math.abs(debt.net)<0.01;

  let cumMoz=0,cumLin=0;
  const monthly=allMs.map(m=>{
    const rows=data.filter(r=>toMk(r.date)===m);
    let moz=0,lin=0;
    for(const r of rows){
      if(r.categoria==='Quitação'){if(r.quemPagou==='Mozicho')moz-=r.valor;else if(r.quemPagou==='Lindito')lin-=r.valor;continue;}
      if(r.categoria==='Receita')continue;
      const v=r.valor;
      if(r.deQuem==='Conjunto'){if(r.quemPagou==='Lindito')moz+=v/2;else if(r.quemPagou==='Mozicho')lin+=v/2;}
      else if(r.deQuem==='Mozicho'&&r.quemPagou==='Lindito')moz+=v;
      else if(r.deQuem==='Lindito'&&r.quemPagou==='Mozicho')lin+=v;
    }
    cumMoz+=moz;cumLin+=lin;
    return{label:mlabel(m),key:m,moz:Math.max(0,moz),lin:Math.max(0,lin),net:moz-lin,cumNet:cumMoz-cumLin};
  }).reverse();

  return(
    <div className="screen" style={{padding:'0 16px'}}>
      <div style={{padding:'calc(14px + var(--safe-t)) 0 12px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
        <div style={{fontSize:22,fontWeight:800}}>Saldos</div>
        <div style={{display:'flex',gap:6}}>
          {onRefresh&&(
            <button onClick={onRefresh} disabled={syncStatus==='syncing'} style={{padding:'8px 12px',borderRadius:20,background:'var(--accent-bg)',border:'1.5px solid var(--accent)',color:'var(--accent)',fontSize:12,fontWeight:700,opacity:syncStatus==='syncing'?0.5:1}}>
              {syncStatus==='syncing'?'⟳':'⟳ Atualizar'}
            </button>
          )}
          {!quites&&<button onClick={()=>onQuit(selM!=='all'?selM:null)} style={{padding:'8px 14px',borderRadius:20,background:'var(--conj-bg)',border:'1.5px solid var(--conj-border)',color:'var(--conj)',fontSize:12,fontWeight:700}}>🤝 Quitar</button>}
        </div>
      </div>

      <div style={{marginBottom:14}}>
        <MonthSelect
          value={selM}
          onChange={setSelM}
          months={allMs.slice().reverse()}
          includeAll
          allLabel="📊 Acumulado (todos)"
          accentColor={quites?'var(--green)':'var(--accent)'}
          statusFor={m=>{
            const mDebt=calcDebt(data.filter(r=>toMk(r.date)===m));
            return Math.abs(mDebt.net)<0.01?'quites':'pendente';
          }}
        />
      </div>

      <div className="card" style={{marginBottom:12,borderLeft:`4px solid ${quites?'var(--green)':debt.net>0?'var(--lin)':'var(--moz)'}`}}>
        {quites?(
          <div style={{textAlign:'center',padding:'8px 0'}}>
            <div style={{fontSize:36}}>🤝</div>
            <div style={{fontSize:22,fontWeight:800,color:'var(--green)',marginTop:8}}>Vocês estão quites!</div>
            <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>
              {selM==='all'?'Nenhuma dívida acumulada':'Nenhum débito neste mês'}
            </div>
          </div>
        ):(
          <>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>
              {selM==='all'?'Saldo acumulado':mlabel(selM)}
            </div>
            <div style={{fontSize:34,fontWeight:800,color:debt.net>0?'var(--lin)':'var(--moz)',marginBottom:4}}>{fmt(Math.abs(debt.net))}</div>
            <div style={{fontSize:14,color:'var(--text2)'}}>{debt.net>0?'🔵 Mozicho deve para Lindito':'🔴 Lindito deve para Mozicho'}</div>
          </>
        )}
      </div>

      {!quites&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <div className="card" style={{padding:'14px',borderLeft:'3px solid var(--lin)'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:5}}>Moz → Lind</div>
            <div style={{fontSize:20,fontWeight:800,color:'var(--lin)'}}>{fmtK(debt.moz)}</div>
          </div>
          <div className="card" style={{padding:'14px',borderLeft:'3px solid var(--moz)'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:5}}>Lind → Moz</div>
            <div style={{fontSize:20,fontWeight:800,color:'var(--moz)'}}>{fmtK(debt.lin)}</div>
          </div>
        </div>
      )}

      <div className="card" style={{padding:'16px 14px'}}>
        <ST>Por mês · delta</ST>
        {monthly.map((m,i)=>{
          const mQuites=Math.abs(m.net)<0.01;
          return(
            <div key={i} style={{padding:'10px 0',borderBottom:i<monthly.length-1?'1px solid var(--border)':'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:14,fontWeight:700,color:selM===m.key?'var(--accent)':'var(--text)'}}>{m.label}</span>
                {mQuites?(
                  <span style={{fontSize:11,fontWeight:700,color:'var(--green)',padding:'2px 8px',borderRadius:10,background:'var(--conj-bg)'}}>🤝 Quites</span>
                ):(
                  <span style={{fontSize:11,fontWeight:700,color:m.net>0?'var(--lin)':'var(--moz)',padding:'2px 8px',borderRadius:10,background:m.net>0?'var(--lin-bg)':'var(--moz-bg)'}}>
                    {m.net>0?`Moz → Lind ${fmtK(m.net)}`:`Lind → Moz ${fmtK(Math.abs(m.net))}`}
                  </span>
                )}
              </div>
              <div style={{display:'flex',gap:10,fontSize:11,color:'var(--text2)'}}>
                <span style={{color:'var(--lin)'}}>Lind pagou: {fmt(m.moz)}</span>
                <span style={{color:'var(--moz)'}}>Moz pagou: {fmt(m.lin)}</span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{height:8}}></div>
    </div>
  );
}

// ── Histórico Screen ──────────────────────────────────────────────────────────
function Historico({data,pessoa:defaultPessoa,onEdit,onRefresh,syncStatus}){
  const [pessoa,setPessoa]=useState(defaultPessoa||'Conjunto');
  // Padrão: mostrar TODOS os meses, ordenados do mais antigo para o mais recente
  const [filterM,setFilterM]=useState('');
  const [filterM2,setFilterM2]=useState('');
  const [q,setQ]=useState('');
  const [filterCat,setFilterCat]=useState('all');
  const [sortDir,setSortDir]=useState('asc'); // 'asc' = mais antigo primeiro (padrão), 'desc' = mais recente primeiro
  const [pageSize,setPageSize]=useState(100);
  const [filterProduto,setFilterProduto]=useState(''); // Filtro de produto/descrição para gráfico de preço
  const [showPriceChart,setShowPriceChart]=useState(false);
  const allMs=[...new Set(data.map(r=>toMk(r.date)))].filter(m=>m&&/^\d{4}-\d{2}$/.test(m)&&m>='2025-01').sort().reverse();

  const filtered=useMemo(()=>{
    // Filtra apenas lançamentos cujo mês foi reconhecido E é >= 2025-01
    let rows=data.filter(r=>{
      const mk=toMk(r.date);
      return mk&&mk>='2025-01';
    });
    if(pessoa==='Lindito')rows=rows.filter(r=>r.deQuem==='Lindito'||r.deQuem==='Conjunto');
    else if(pessoa==='Mozicho')rows=rows.filter(r=>r.deQuem==='Mozicho'||r.deQuem==='Conjunto');
    // Aplica filtro de mês só se algum estiver selecionado
    if(filterM&&filterM2)rows=rows.filter(r=>toMk(r.date)>=filterM&&toMk(r.date)<=filterM2);
    else if(filterM)rows=rows.filter(r=>toMk(r.date)===filterM);
    if(filterCat!=='all')rows=rows.filter(r=>r.categoria===filterCat);
    if(q)rows=rows.filter(r=>r.desc.toLowerCase().includes(q.toLowerCase())||r.categoria.toLowerCase().includes(q.toLowerCase()));
    return rows.sort((a,b)=>sortDir==='desc'?(b.date>a.date?1:-1):(a.date>b.date?1:-1));
  },[data,pessoa,filterM,filterM2,q,filterCat,sortDir]);

  const visible=filtered.slice(0,pageSize);
  const hasMore=filtered.length>pageSize;

  const total=filtered.reduce((s,r)=>s+(r.deQuem==='Conjunto'&&pessoa!=='Conjunto'?r.valor/2:r.valor),0);
  const pColor=PERSON_COLOR[pessoa]||'var(--accent)';
  // Categorias em ordem alfabética
  const sortedCats=getAllCats().slice().sort((a,b)=>a.localeCompare(b,'pt-BR'));

  // Gráfico de histórico de preços por produto
  const allProdutos=useMemo(()=>{
    const prods=new Map();
    for(const r of data){
      const mk=toMk(r.date);
      if(mk&&mk>='2025-01'){
        const key=r.desc.toLowerCase();
        if(!prods.has(key)){
          prods.set(key,{desc:r.desc,history:[]});
        }
        prods.get(key).history.push({date:r.date,valor:r.valor});
      }
    }
    // Ordena por frequência (mais repetições = mais no topo)
    return Array.from(prods.values()).sort((a,b)=>b.history.length-a.history.length);
  },[data]);

  // Dados do produto selecionado para gráfico
  const selectedProd=useMemo(()=>{
    if(!filterProduto)return null;
    const p=allProdutos.find(x=>x.desc.toLowerCase()===filterProduto.toLowerCase());
    if(!p)return null;
    return{desc:p.desc,history:p.history.sort((a,b)=>new Date(a.date)-new Date(b.date))};
  },[filterProduto,allProdutos]);

  return(
    <div className="screen" style={{padding:'0 16px'}}>
      <div style={{padding:'calc(14px + var(--safe-t)) 0 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:22,fontWeight:800}}>Histórico</div>
        <button onClick={onRefresh} disabled={syncStatus==='syncing'} style={{padding:'8px 12px',borderRadius:20,background:'var(--accent-bg)',border:'1.5px solid var(--accent)',color:'var(--accent)',fontSize:12,fontWeight:700,opacity:syncStatus==='syncing'?0.5:1}}>
          {syncStatus==='syncing'?'⟳ Sync...':'⟳ Atualizar'}
        </button>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        {['Lindito','Mozicho','Conjunto'].map(p=>(
          <button key={p} className={`person-pill ${PERSON_CLS[p]} ${pessoa===p?'active':''}`} onClick={()=>setPessoa(p)}>{p}</button>
        ))}
      </div>
      <input type="search" placeholder="Buscar..." value={q} onChange={e=>setQ(e.target.value)}
        style={{width:'100%',padding:'11px 14px',background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:12,fontSize:14,color:'var(--text)',marginBottom:10,outline:'none'}}/>
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>De</div>
          <MonthSelect value={filterM} onChange={v=>{setFilterM(v);if(!v)setFilterM2('');}} months={allMs} placeholder="Todos os meses"/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>Até</div>
          {filterM?(
            <MonthSelect value={filterM2} onChange={setFilterM2} months={allMs.filter(m=>m>=filterM)} placeholder="— mesmo"/>
          ):(
            <div style={{width:'100%',padding:'10px 14px',background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:12,fontSize:13,color:'var(--text3)',opacity:0.5}}>— mesmo</div>
          )}
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'flex-end'}}>
        <div style={{flex:1}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>Categoria</div>
          <div style={{position:'relative'}}>
            <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{
              width:'100%',padding:'10px 36px 10px 14px',background:'var(--bg2)',
              border:`1.5px solid ${filterCat!=='all'?(getCatColor(filterCat)):'var(--border)'}`,
              borderRadius:12,fontSize:13,fontWeight:700,
              color:filterCat!=='all'?getCatColor(filterCat):'var(--text)',
              outline:'none',appearance:'none',cursor:'pointer'
            }}>
              <option value="all">📋 Todas as categorias</option>
              {sortedCats.map(c=>(
                <option key={c} value={c}>{getCatEmoji(c)} {c}</option>
              ))}
            </select>
            <span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',fontSize:10,color:'var(--text2)'}}>▼</span>
          </div>
        </div>
        {filterCat!=='all'&&(
          <button onClick={()=>setFilterCat('all')} style={{padding:'10px 14px',borderRadius:12,background:'var(--moz-bg)',border:'1.5px solid var(--moz-border)',color:'var(--moz)',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>
            ✕ Limpar filtro
          </button>
        )}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'flex-end'}}>
        <div style={{flex:1}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>Filtrar por Produto</div>
          <div style={{position:'relative'}}>
            <select value={filterProduto} onChange={e=>{setFilterProduto(e.target.value);setShowPriceChart(!!e.target.value);}} style={{
              width:'100%',padding:'10px 36px 10px 14px',background:'var(--bg2)',
              border:`1.5px solid ${filterProduto?'var(--accent)':'var(--border)'}`,
              borderRadius:12,fontSize:13,fontWeight:700,
              color:filterProduto?'var(--accent)':'var(--text)',
              outline:'none',appearance:'none',cursor:'pointer'
            }}>
              <option value="">📊 Histórico de preços</option>
              {allProdutos.map((p,i)=>(
                <option key={i} value={p.desc}>{p.desc} ({p.history.length}x)</option>
              ))}
            </select>
            <span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',fontSize:10,color:'var(--text2)'}}>▼</span>
          </div>
        </div>
        {filterProduto&&(
          <button onClick={()=>{setFilterProduto('');setShowPriceChart(false);}} style={{padding:'10px 14px',borderRadius:12,background:'var(--moz-bg)',border:'1.5px solid var(--moz-border)',color:'var(--moz)',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>
            ✕ Limpar
          </button>
        )}
      </div>
      {showPriceChart&&selectedProd&&(
        <div style={{marginBottom:16,padding:14,background:'var(--bg2)',borderRadius:12,border:'1.5px solid var(--accent)',overflow:'hidden'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--accent)',marginBottom:10}}>📈 {selectedProd.desc}</div>
          <div style={{position:'relative',height:180,marginBottom:8}}>
            {(()=>{
              if(selectedProd.history.length<2){
                return<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:12}}>Apenas {selectedProd.history.length} registro — precisa de 2+ para gráfico</div>;
              }
              const minPrice=Math.min(...selectedProd.history.map(x=>x.valor));
              const maxPrice=Math.max(...selectedProd.history.map(x=>x.valor));
              const range=Math.max(maxPrice-minPrice,1);
              const graphHeight=160;
              const padding=20;
              const points=selectedProd.history.map((h,i)=>{
                const x=padding+(i/(selectedProd.history.length-1))*(100-2*padding);
                const normalized=(h.valor-minPrice)/range;
                const y=graphHeight-(normalized*140);
                return{...h,x,y};
              });
              const svgPath=points.map((p,i)=>`${i===0?'M':'L'} ${p.x} ${p.y}`).join(' ');
              const priceTrend=selectedProd.history[selectedProd.history.length-1].valor>selectedProd.history[0].valor?'📈 subiu':'📉 caiu';
              const priceDiff=selectedProd.history[selectedProd.history.length-1].valor-selectedProd.history[0].valor;
              const priceDiffPct=(priceDiff/selectedProd.history[0].valor*100).toFixed(1);
              return(
                <div style={{position:'relative',width:'100%',height:'100%'}}>
                  <svg style={{width:'100%',height:'100%',position:'absolute',top:0,left:0}}>
                    <defs>
                      <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style={{stopColor:'var(--accent)',stopOpacity:0.3}}/>
                        <stop offset="100%" style={{stopColor:'var(--accent)',stopOpacity:0.05}}/>
                      </linearGradient>
                    </defs>
                    <path d={svgPath+` L ${points[points.length-1].x} ${graphHeight} L ${padding} ${graphHeight} Z`} fill="url(#grad)" stroke="none"/>
                    <path d={svgPath} stroke="var(--accent)" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                    {points.map((p,i)=>(
                      <circle key={i} cx={p.x} cy={p.y} r="3.5" fill="var(--accent)" opacity="0.8"/>
                    ))}
                  </svg>
                  <div style={{position:'absolute',bottom:4,left:4,fontSize:10,color:'var(--text2)',background:'rgba(0,0,0,0.3)',padding:'3px 6px',borderRadius:4}}>{fmt(minPrice)}</div>
                  <div style={{position:'absolute',top:4,left:4,fontSize:10,color:'var(--accent)',background:'rgba(0,0,0,0.3)',padding:'3px 6px',borderRadius:4}}>{fmt(maxPrice)}</div>
                </div>
              );

// ── Gerenciar Categorias Modal ────────────────────────────────────────────────
function CategoriasModal({onClose,onChange,data}){
  useBackButton(onClose,'cat-mgr');
  const [showNew,setShowNew]=useState(false);
  const [_,setTick]=useState(0);
  const force=()=>setTick(t=>t+1);

  // Quantos lançamentos em cada categoria
  const counts={};
  for(const r of data){
    counts[r.categoria]=(counts[r.categoria]||0)+1;
  }
  // Lista alfabética
  const list=getCats().slice().sort((a,b)=>a.localeCompare(b,'pt-BR'));

  function removeCat(cat){
    const isDefault=DEFAULT_CATS.includes(cat);
    if(counts[cat]>0){
      alert(`Não é possível remover "${cat}" — há ${counts[cat]} lançamento(s) usando essa categoria. Edite-os primeiro para outra categoria.`);
      return;
    }
    if(isDefault){
      if(!confirm(`Remover a categoria padrão "${cat}"?`))return;
    } else {
      if(!confirm(`Remover a categoria "${cat}"?`))return;
    }
    CAT_STORE.list=CAT_STORE.list.filter(c=>c!==cat);
    saveCatStore(CAT_STORE);
    onChange&&onChange();
    force();
  }

  function addCat(nome,emoji,cor){
    const trim=nome.trim();
    if(!trim||CAT_STORE.list.includes(trim))return;
    CAT_STORE.list.push(trim);
    CAT_STORE.emoji[trim]=emoji||EXTRA_EMOJIS[CAT_STORE.list.length%EXTRA_EMOJIS.length];
    CAT_STORE.color[trim]=cor||EXTRA_PALETTE[CAT_STORE.list.length%EXTRA_PALETTE.length];
    saveCatStore(CAT_STORE);
    setShowNew(false);
    onChange&&onChange();
    force();
  }

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <button className="modal-x" onClick={onClose} aria-label="Fechar">×</button>
        <div className="modal-handle"></div>
        <div className="modal-title">📂 Categorias</div>
        <button className="btn" onClick={()=>setShowNew(true)} style={{marginTop:0,marginBottom:16,background:'var(--accent)'}}>
          ➕ Nova categoria
        </button>
        <div style={{padding:'0 20px'}}>
          {list.map(c=>{
            const isDefault=DEFAULT_CATS.includes(c);
            const n=counts[c]||0;
            return(
              <div key={c} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{width:36,height:36,borderRadius:10,background:getCatColor(c)+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>
                  {getCatEmoji(c)}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:getCatColor(c)}}>{c}</div>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>
                    {n} lançamento{n!==1?'s':''}
                    {isDefault&&<span style={{marginLeft:8,padding:'1px 6px',background:'var(--bg3)',borderRadius:4,fontSize:10}}>padrão</span>}
                  </div>
                </div>
                <button onClick={()=>removeCat(c)} disabled={n>0}
                  style={{padding:'6px 10px',borderRadius:8,background:n>0?'var(--bg3)':'var(--moz-bg)',color:n>0?'var(--text3)':'var(--moz)',border:'none',fontSize:12,fontWeight:700,opacity:n>0?0.5:1,cursor:n>0?'not-allowed':'pointer'}}>
                  Remover
                </button>
              </div>
            );
          })}
        </div>
        <div style={{padding:'12px 20px 0',fontSize:11,color:'var(--text2)',textAlign:'center',lineHeight:1.5}}>
          As categorias customizadas são salvas no seu dispositivo. Lançamentos em uma categoria removida não são alterados.
        </div>
        {showNew&&<NovaCategoriaModal onClose={()=>setShowNew(false)} onSave={addCat}/>}
      </div>
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('home');
  const [data,setData]=useState([]);
  const [pessoa,setPessoa]=useState(()=>localStorage.getItem('gastos_pessoa')||'Lindito');
  const [theme,setTheme]=useState(()=>localStorage.getItem('gastos_theme')||'light');
  const [showAdd,setShowAdd]=useState(false);
  const [showQuit,setShowQuit]=useState(false);
  const [quitPreMonth,setQuitPreMonth]=useState(null);
  const [editEntry,setEditEntry]=useState(null);
  const [toast,setToast]=useState(null);
  const [syncStatus,setSyncStatus]=useState('offline');
  const [setupDone,setSetupDone]=useState(()=>!!localStorage.getItem('g_sheet_id'));
  const [budgetData,setBudgetData]=useState({});
  const [catVersion,setCatVersion]=useState(0); // força re-render ao adicionar categoria
  const [showCatMgr,setShowCatMgr]=useState(false);

  const clientId=localStorage.getItem('g_client_id');
  const sheetId=localStorage.getItem('g_sheet_id');
  const {token,loading,signIn,signOut,tokenExpired}=useGoogleAuth(clientId);

  const db=useMemo(()=>token&&sheetId?new SheetsDB(sheetId,token):null,[token,sheetId]);

  // Os lançamentos são obtidos exclusivamente pela Google Sheets API após autenticação.

  // Sync from Sheets: única fonte dos lançamentos financeiros.
  const syncFromSheets=useCallback(async()=>{
    if(!db)return;
    setSyncStatus('syncing');
    try{
      const sheetRows=await db.getAll();
      setData(sheetRows);
      setSyncStatus('ok');
    }catch(e){
      console.error(e);
      setData([]);
      setSyncStatus('error');
      showToast('Erro ao carregar dados da planilha. Verifique o acesso Google.','err');
    }
  },[db]);

  // Sync budgets from Sheets
  const syncBudgetsFromSheets=useCallback(async()=>{
    if(!db)return;
    try{
      const sheetBudgets=await db.getBudgets();
      if(Object.keys(sheetBudgets).length>0){
        setBudgetData(sheetBudgets);
      }
    }catch(e){
      console.warn('Erro ao carregar orçamentos:',e);
    }
  },[db]);

  useEffect(()=>{if(db){syncFromSheets();syncBudgetsFromSheets();}},[db]);

  // Auto-sync: poll every 60s + when tab regains focus, so changes added directly
  // in the spreadsheet show up automatically.
  useEffect(()=>{
    if(!db)return;
    const id=setInterval(()=>{
      if(document.visibilityState==='visible'){syncFromSheets();syncBudgetsFromSheets();}
    },60*1000);
    function onVis(){if(document.visibilityState==='visible'){syncFromSheets();syncBudgetsFromSheets();}}
    function onFocus(){syncFromSheets();syncBudgetsFromSheets();}
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('focus',onFocus);
    return()=>{
      clearInterval(id);
      document.removeEventListener('visibilitychange',onVis);
      window.removeEventListener('focus',onFocus);
    };
  },[db,syncFromSheets,syncBudgetsFromSheets]);
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('gastos_theme',theme);},[theme]);
  useEffect(()=>{localStorage.setItem('gastos_pessoa',pessoa);},[pessoa]);
  // Segurança: desabilita versões offline antigas e limpa caches deste site.
  // A fonte de dados passa a ser exclusivamente a planilha online autenticada.
  useEffect(()=>{
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations()
        .then(registrations=>registrations.forEach(reg=>reg.unregister()))
        .catch(()=>{});
    }
    if('caches' in window){
      caches.keys()
        .then(keys=>Promise.all(keys.map(key=>caches.delete(key))))
        .catch(()=>{});
    }
  },[]);

  function showToast(msg,type='ok'){setToast({msg,type});setTimeout(()=>setToast(null),2500);}

  async function handleSave(entry){
    if(!db){
      showToast('Faça login no Google para salvar lançamentos.','err');
      return;
    }
    setSyncStatus('syncing');
    const entries=Array.isArray(entry)?entry:[entry];
    let okCount=0;
    try{
      for(const item of entries){
        await db.append(item);
        okCount++;
      }
      // Força re-leitura da planilha para garantir que o novo lançamento aparece
      const sheetRows=await db.getAll();
      setData([...sheetRows]); // spread garante nova referência e re-render
      setSyncStatus('ok');
      showToast(entries.length>1?`💳 ${okCount} lançamentos salvos na planilha!`:'💾 Salvo no Google Sheets!');
    }catch(e){
      // Mesmo com erro no append, tenta recarregar o que já está na planilha
      try{
        const sheetRows=await db.getAll();
        setData([...sheetRows]);
        setSyncStatus('ok');
      }catch{
        setSyncStatus('error');
      }
      showToast(okCount>0?`${okCount} salvo(s); ocorreu erro nos demais. Revise a planilha.`:'Não foi possível salvar na planilha.','err');
    }
  }

  async function handleEdit(entry,updated){
    if(!db||!entry._row){
      showToast('Faça login novamente para editar.','err');
      setEditEntry(null);
      return;
    }
    setSyncStatus('syncing');
    try{
      await db.update(entry._row,updated);
      const sheetRows=await db.getAll();
      setData([...sheetRows]);
      setSyncStatus('ok');
      showToast('✓ Atualizado na planilha!');
    }catch(e){
      showToast('Erro ao atualizar na planilha.','err');
      setSyncStatus('error');
    }
    setEditEntry(null);
  }

  async function handleDelete(entry){
    if(!window.confirm('Excluir este lançamento?'))return;
    if(!db||!entry._row){
      showToast('Faça login novamente para excluir.','err');
      setEditEntry(null);
      return;
    }
    setSyncStatus('syncing');
    try{
      await db.delete(entry._row);
      const sheetRows=await db.getAll();
      setData([...sheetRows]);
      setSyncStatus('ok');
      showToast('🗑️ Excluído da planilha!');
    }catch(e){
      showToast('Erro ao excluir na planilha.','err');
      setSyncStatus('error');
    }
    setEditEntry(null);
  }

  async function syncBudgetToSheets(monthKey,budgets,extras){
    if(!db){
      showToast('Faça login no Google para salvar orçamentos.','err');
      return;
    }
    setSyncStatus('syncing');
    try{
      await db.saveBudget(monthKey,budgets,extras);
      await syncBudgetsFromSheets();
      setSyncStatus('ok');
      showToast('💾 Orçamento salvo na planilha!');
    }catch(e){
      setSyncStatus('error');
      showToast('Erro ao salvar orçamento na planilha.','err');
    }
  }

  const debtTotal=calcDebt(data);

  if(!setupDone)return(<SetupScreen onDone={()=>setSetupDone(true)}/>);
  if(!token)return(<AuthGate onSignIn={signIn} onReconfigure={()=>setSetupDone(false)} loading={loading}/>);

  const tabs=[
    {id:'home',icon:'🏠',label:'Início'},
    {id:'saldos',icon:'⚖️',label:'Saldos'},
    {id:'historico',icon:'📋',label:'Histórico'},
    {id:'config',icon:'⚙️',label:'Config'},
  ];

  return(
    <>
      {tab==='home'&&<Home data={data} pessoa={pessoa} setPessoa={setPessoa} budgetData={budgetData} setBudgetData={setBudgetData} syncStatus={syncStatus} syncBudgetToSheets={syncBudgetToSheets} onRefresh={syncFromSheets}/>}
      {tab==='saldos'&&<Saldos data={data} onQuit={(m)=>{setQuitPreMonth(m||null);setShowQuit(true);}} onRefresh={syncFromSheets} syncStatus={syncStatus}/>}
      {tab==='historico'&&<Historico data={data} pessoa={pessoa} onEdit={setEditEntry} onRefresh={syncFromSheets} syncStatus={syncStatus}/>}
      {tab==='config'&&(
        <div className="screen" style={{padding:'0 16px'}}>
          <div style={{padding:'calc(14px + var(--safe-t)) 0 20px'}}><div style={{fontSize:22,fontWeight:800}}>Configurações</div></div>
          <div className="card" style={{marginBottom:12}}>
            <ST>Google Sheets</ST>
            {token?(
              <div>
                <div style={{fontSize:13,color:'var(--green)',fontWeight:700,marginBottom:8}}>
                  ✓ Conectado
                </div>
                <div style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>
                  Planilha: <code style={{fontSize:11,background:'var(--bg3)',padding:'2px 6px',borderRadius:4}}>{sheetId?.slice(0,20)}...</code>
                </div>
                <a href={`https://docs.google.com/spreadsheets/d/${sheetId}/edit`} target="_blank" rel="noopener noreferrer"
                  style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',padding:'12px',borderRadius:12,background:'var(--conj-bg)',color:'var(--conj)',border:'1.5px solid var(--conj-border)',fontSize:13,fontWeight:700,textDecoration:'none',marginBottom:10}}>
                  📊 Abrir planilha original
                </a>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={syncFromSheets} style={{flex:1,padding:'10px',borderRadius:12,background:'var(--accent)',color:'#fff',fontSize:13,fontWeight:700}}>⟳ Sincronizar</button>
                  <button onClick={signOut} style={{flex:1,padding:'10px',borderRadius:12,background:'var(--bg3)',color:'var(--text2)',fontSize:13,fontWeight:600}}>Desconectar</button>
                </div>
              </div>
            ):(
              <div>
                <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>
                  {clientId?'Configure o Google OAuth para sincronizar os dados.':'Nenhuma configuração encontrada.'}

                <div style={{display:'flex',gap:8}}>
                  {clientId&&<button onClick={()=>signIn('select_account')} style={{flex:1,padding:'11px',borderRadius:12,background:'var(--accent)',color:'#fff',fontSize:13,fontWeight:700}}>🔑 Fazer login Google</button>}

                  </>
                );
              })()}
            </div>
          </div>
        </div>
      )}

      {/* Token expiry banner — only show on real expiration, not 'expires tomorrow' nags */}
      {token&&tokenExpired&&(
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:150,background:'var(--red)',color:'#fff',padding:'calc(var(--safe-t) + 10px) 16px 10px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,boxShadow:'0 2px 12px rgba(0,0,0,0.2)'}}>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>⚠️ Sessão expirada</div>
            <div style={{fontSize:11,opacity:0.9}}>Entre novamente para carregar e salvar dados</div>
          </div>
          <button onClick={()=>signIn('select_account')} style={{background:'#fff',color:'var(--red)',border:'none',borderRadius:20,padding:'7px 16px',fontSize:13,fontWeight:700,flexShrink:0}}>
            Reconectar
          </button>
        </div>
      )}
      <button className="fab" onClick={()=>setShowAdd(true)} aria-label="Adicionar">
        <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 4V22M4 13H22" stroke="white" strokeWidth="2.8" strokeLinecap="round"/>
        </svg>
      </button>
      <nav className="nav">
        {tabs.map(t=>(
          <button key={t.id} className={`nav-item ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
            <span className="nav-icon">{t.icon}</span>
            <span className="nav-label">{t.label}</span>
            <span className="nav-dot"></span>
          </button>
        ))}
      </nav>

      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onSave={handleSave} defaultPessoa={pessoa} debt={debtTotal} data={data} onCatStoreChange={()=>setCatVersion(v=>v+1)}/>}
      {showQuit&&<QuitacaoModal onClose={()=>{setShowQuit(false);setQuitPreMonth(null);}} onSave={handleSave} debt={debtTotal} data={data} preSelMonth={quitPreMonth}/>}
      {editEntry&&<EditModal entry={editEntry} onClose={()=>setEditEntry(null)} onSave={(updated)=>handleEdit(editEntry,updated)} onDelete={handleDelete} catVersion={catVersion}/>}
      {showCatMgr&&<CategoriasModal onClose={()=>setShowCatMgr(false)} onChange={()=>setCatVersion(v=>v+1)} data={data}/>}
      {toast&&<div className={`toast ${toast.type||'ok'}`}>{toast.msg}</div>}
    </>
  );
}

// Load Google Identity Services then render
function loadGIS(cb){
  if(window.google?.accounts?.oauth2){cb();return;}
  const s=document.createElement('script');
  s.src='https://accounts.google.com/gsi/client';
  s.onload=cb;
  document.head.appendChild(s);
}

loadGIS(()=>{
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
});
</script>
</body>
</html>
